name: E2E Tests

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    test-dev:
        name: E2E Tests - Dev
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v3

            - name: Start app
              run: docker run -d -p 3000:3000 ghcr.io/danielsilva-loanpro/sdet-interview-challenge-dev:latest

            - name: Wait for app
              run: sleep 5

            - name: Install Node
              uses: actions/setup-node@v4
              with:
                node-version: 20

            - name: Install dependencies
              run: npm ci

            - name: Install Playwright
              run: npx playwright install --with-deps chromium

            - name: Run tests
              run: npx playwright test 
              env:
                BASE_URL: dev

            - name: Upload report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                name: playwright-report-dev
                path: playwright-report/

    test-prod:
        name: E2E Tests - Prod
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v3

            - name: Start app
              run: docker run -d -p 3000:3000 ghcr.io/danielsilva-loanpro/sdet-interview-challenge-dev:latest

            - name: Wait for app
              run: sleep 5

            - name: Install Node
              uses: actions/setup-node@v4
              with:
                node-version: 20

            - name: Install dependencies
              run: npm ci

            - name: Install Playwright
              run: npx playwright install --with-deps chromium

            - name: Run tests
              run: npx playwright test 
              env:
                BASE_URL: dev

            - name: Upload report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                name: playwright-report-dev
                path: playwright-report/